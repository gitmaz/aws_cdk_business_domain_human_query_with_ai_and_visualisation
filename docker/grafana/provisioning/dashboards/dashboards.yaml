apiVersion: 1

providers:
  - name: ai-query-playground
    orgId: 1
    folder: AI Query Playground
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
