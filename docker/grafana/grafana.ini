; Local Grafana config (anonymous Admin) — see docker-compose.yml header for context.
; Production AMG settings live on AWS, not here.

[server]
http_port = 3000
root_url = http://localhost:3000/

[users]
allow_sign_up = false
default_theme = dark

[auth.anonymous]
enabled = true
org_role = Admin

[security]
allow_embedding = true

[analytics]
reporting_enabled = false
check_for_updates = false
check_for_plugin_updates = false

[log]
mode = console
level = info

[feature_toggles]
; Enable the public dashboards / scenes features useful for embed flows.
publicDashboards = true
